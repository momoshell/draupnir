# =============================================================================
# Draupnir — Pre-commit Hooks
# =============================================================================
# Install:  uv sync --extra db --extra jobs --extra dev --extra test && uv run pre-commit install
# Run all:  uv run pre-commit run --all-files
# =============================================================================

repos:
  # --- Basic hygiene --------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=10240"]  # 10 MB
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml

  # --- Ruff: lint + format --------------------------------------------------
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix --show-fixes
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]

  # --- mypy: static type checking -------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: true
