# Fixture Manifest
# All test fixtures must be registered here with complete metadata.
# See README.md for fixture policy.

fixtures:
  - filename: dxf/simple-line.dxf
    format: DXF
    tier: tiny_synthetic
    source: generated
    license: CC0-1.0
    allowed_in_git: true
    units: meters
    expected_extraction_notes: |
      Single LINE entity from (0,0,0) to (10,0,0) on layer 0.
      Header sets $INSUNITS to 6 (meters).
    expected_review_state: approved
    expected_validation_status: valid
    expected_quantities:
      line_count: 1
      total_length: 10.0
    acceptance_checks:
      format:
        entity_types:
          - LINE
        layer_names:
          - "0"
        unit_system: meters
      quantities:
        line_count:
          expected: 1
          comparison: exact
          provenance_required: true
          source_entity_refs:
            - entities.LINE:0
        total_length:
          expected: 10.0
          comparison: exact
          rounding:
            stage: none
          provenance_required: true
          source_entity_refs:
            - entities.LINE:0
          expected_review_state: approved
      notes: |
        This fixture is a deterministic geometry smoke test.
        Future global tolerance values may be defined in #61.

  - filename: ifc/smoke-minimal.ifc
    format: IFC
    tier: tiny_synthetic
    source: generated
    license: CC0-1.0
    allowed_in_git: true
    units: meters
    expected_extraction_notes: |
      Minimal IFC STEP header + IfcProject shell for adapter wiring smoke checks.
      Uses IFC4 schema metadata and should preserve schema provenance in canonical output.
    expected_review_state: review_required
    expected_validation_status: needs_review
    expected_quantities:
      entity_count: 0
    acceptance_checks:
      format:
        expected_schema: IFC4
        object_scope:
          - IfcProject
      quantities:
        entity_count:
          expected: 0
          comparison: review_gated
          provenance_required: true
          expected_review_state: review_required
      notes: |
        This is a contract smoke fixture, not a semantic BIM completeness fixture.

  - filename: pdf/vector-smoke.pdf
    format: PDF
    tier: tiny_synthetic
    source: generated
    license: CC0-1.0
    allowed_in_git: true
    units: unknown
    expected_extraction_notes: |
      Single-page vector PDF with simple stroke geometry and inline text marker.
      Intended for vector-adapter smoke coverage with explicit unconfirmed scale metadata expected.
    expected_review_state: review_required
    expected_validation_status: needs_review
    expected_quantities:
      page_count: 1
      linework_hint_count: 1
    acceptance_checks:
      format:
        page_count: 1
        geometry_mode: vector
        text_expected: true
      quantities:
        linework_hint_count:
          expected: 1
          comparison: review_gated
          provenance_required: true
          expected_review_state: review_required
      notes: |
        Vector PDF extraction stays safety-first until real-world scale is confirmed.

  - filename: pdf/raster-smoke.pdf
    format: PDF
    tier: tiny_synthetic
    source: generated
    license: CC0-1.0
    allowed_in_git: true
    units: unknown
    expected_extraction_notes: |
      Single-page PDF placeholder used for raster adapter wiring and review-first checks.
      Outputs are expected to remain review-gated even when confidence is high.
    expected_review_state: review_required
    expected_validation_status: needs_review
    expected_quantities:
      page_count: 1
    acceptance_checks:
      format:
        page_count: 1
        geometry_mode: raster
        ocr_expected: true
      quantities:
        page_count:
          expected: 1
          comparison: review_gated
          provenance_required: true
          expected_review_state: review_required
      notes: |
        Raster ingestion is review-first by policy and should keep quantity gates closed.

  - filename: dwg/libredwg-wrapper-smoke.txt
    format: DWG
    tier: tiny_synthetic
    source: generated
    license: CC0-1.0
    allowed_in_git: true
    units: unknown
    expected_extraction_notes: |
      Text placeholder for DWG adapter-wrapper contract metadata smoke checks.
      This fixture intentionally avoids committing real/proprietary DWG binaries.
    expected_review_state: review_required
    expected_validation_status: needs_review
    expected_quantities:
      entity_count: 0
    acceptance_checks:
      format:
        wrapper_smoke_only: true
        binary_in_repo: false
      quantities:
        entity_count:
          expected: 0
          comparison: review_gated
          provenance_required: true
          expected_review_state: review_required
      notes: |
        Maintains phase coverage beyond DXF while keeping fixture licensing risk low.
