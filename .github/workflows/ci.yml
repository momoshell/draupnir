name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"

      - name: Install dependencies
        run: uv sync --locked --extra db --extra jobs --extra dev --extra test

      - name: Run ruff
        run: uv run ruff check app tests

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"

      - name: Install dependencies
        run: uv sync --locked --extra db --extra jobs --extra dev --extra test

      - name: Run mypy
        run: uv run mypy app tests

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        # NOTE: TRD mentions PostgreSQL 18 (planned); latest stable is 17.
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: draupnir_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"

      - name: Install dependencies
        run: uv sync --locked --extra db --extra jobs --extra dev --extra test

      - name: Run Alembic migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/draupnir_test

      - name: Run pytest
        run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/draupnir_test
